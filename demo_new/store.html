<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>DOUBLE K STORE</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Poppins', sans-serif; margin: 0; background: #f4f6f8; color: #333; }
        .nav { background: #2d1b69; color: white; padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; position: sticky; top:0; z-index: 100; }
        .cart-btn { background: #e74c3c; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; padding: 40px; }
        .card { background: white; padding: 20px; border-radius: 10px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .card i { font-size: 4rem; color: #4ecdc4; margin-bottom: 15px; }
        .btn-add { background: #4ecdc4; color: white; border: none; padding: 10px; width: 100%; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        
        /* Modal Giỏ hàng */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; }
        .modal-content { background: white; width: 500px; padding: 30px; border-radius: 10px; max-height: 80vh; overflow-y: auto; }
        .cart-item { display: flex; justify-content: space-between; border-bottom: 1px solid #eee; padding: 10px 0; }
    </style>
</head>
<body>
    <div class="nav">
        <h2><i class="fas fa-store"></i> DOUBLE K STORE</h2>
        <div style="display: flex; gap: 20px; align-items: center;">
            <span id="welcomeName">Xin chào!</span>
            <div class="cart-btn" onclick="openCart()"><i class="fas fa-shopping-cart"></i> Giỏ hàng (<span id="cartCount">0</span>)</div>
            <button onclick="logout()" style="background: transparent; color: white; border: 1px solid white; padding: 5px 10px; cursor: pointer;">Đăng xuất</button>
        </div>
    </div>

    <h2 style="text-align: center; margin-top: 30px;">Sản Phẩm Nổi Bật</h2>
    <div class="grid" id="productGrid"></div>

    <div class="modal" id="cartModal">
        <div class="modal-content">
            <h2 style="color: #2d1b69; border-bottom: 2px solid #4ecdc4; padding-bottom: 10px;">Giỏ Hàng Của Bạn</h2>
            <div id="cartItems"></div>
            <h3 style="text-align: right; color: #e74c3c; margin-top: 20px;">Tổng tiền: <span id="cartTotal">0</span> đ</h3>
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button onclick="closeCart()" style="flex:1; padding:10px; cursor:pointer;">Đóng</button>
                <button onclick="checkout()" style="flex:2; padding:10px; background:#2ecc71; color:white; border:none; cursor:pointer; font-weight:bold;">Thanh Toán Trực Tuyến</button>
            </div>
        </div>
    </div>

    <script src="db.js"></script>
    <script>
        let currentUser = getCurrentUser();
        if (!currentUser || currentUser.role !== 'Khách hàng') {
            alert('Bạn phải đăng nhập với tư cách Khách hàng!');
            window.location.href = 'index.html'; // Bắt quay về nếu chưa đăng nhập
        }

        document.getElementById('welcomeName').innerText = `Xin chào, ${currentUser.name}`;
        
        // MẢNG LƯU GIỎ HÀNG (Tạm thời trên RAM)
        let cart = [];

        // In danh sách sản phẩm ra màn hình
        function renderProducts() {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = '';
            db.products.forEach(p => {
                grid.innerHTML += `
                    <div class="card">
                        <i class="fas ${p.img || 'fa-box'}"></i>
                        <h3>${p.name}</h3>
                        <p style="color: #e74c3c; font-weight: bold; font-size: 1.2rem;">${p.price.toLocaleString()} đ</p>
                        <p style="font-size: 0.9rem; color: gray;">Kho: ${p.stock}</p>
                        <button class="btn-add" onclick="addToCart('${p.id}')">Thêm vào giỏ</button>
                    </div>
                `;
            });
        }

        // Logic thêm vào giỏ hàng
        function addToCart(pId) {
            const product = db.products.find(x => x.id === pId);
            if (product.stock <= 0) return alert('Sản phẩm đã hết hàng!');

            const existingItem = cart.find(x => x.id === pId);
            if (existingItem) {
                if(existingItem.qty >= product.stock) return alert('Không đủ hàng trong kho!');
                existingItem.qty += 1;
            } else {
                cart.push({ id: product.id, name: product.name, price: product.price, qty: 1 });
            }
            
            updateCartUI();
        }

        function updateCartUI() {
            document.getElementById('cartCount').innerText = cart.reduce((sum, item) => sum + item.qty, 0);
        }

        function openCart() {
            const container = document.getElementById('cartItems');
            container.innerHTML = '';
            let total = 0;

            if (cart.length === 0) {
                container.innerHTML = '<p style="text-align:center;">Giỏ hàng trống!</p>';
            } else {
                cart.forEach(item => {
                    const itemTotal = item.price * item.qty;
                    total += itemTotal;
                    container.innerHTML += `
                        <div class="cart-item">
                            <div><strong>${item.name}</strong> <br> <small>${item.price.toLocaleString()} đ x ${item.qty}</small></div>
                            <div style="font-weight:bold; color:#e67e22;">${itemTotal.toLocaleString()} đ</div>
                        </div>
                    `;
                });
            }
            document.getElementById('cartTotal').innerText = total.toLocaleString();
            document.getElementById('cartModal').style.display = 'flex';
        }

        function closeCart() { document.getElementById('cartModal').style.display = 'none'; }

        // Logic thanh toán
        function checkout() {
            if (cart.length === 0) return alert('Vui lòng chọn sản phẩm trước khi thanh toán!');
            
            // Tìm ID thực sự của khách hàng trong DB khách hàng dựa trên SĐT đang đăng nhập
            let customerData = db.customers.find(c => c.phone === currentUser.id);

            // Chạy vòng lặp lưu từng sản phẩm trong giỏ thành 1 hóa đơn (Hoặc 1 hóa đơn chung)
            cart.forEach(item => {
                // Tạo hóa đơn
                db.orders.push({
                    id: generateId('HD'), customerId: customerData.id, productId: item.id,
                    qty: item.qty, total: item.price * item.qty, staffId: 'Web_Store', status: 'Chưa thanh toán'
                });
                
                // Trừ kho thật trong DB
                let p = db.products.find(x => x.id === item.id);
                p.stock -= item.qty;
            });

            saveDB(); // Lưu vào localStorage
            alert('🎉 Thanh toán thành công! Chúng tôi sẽ liên hệ để giao hàng.');
            
            cart = []; // Làm rỗng giỏ
            updateCartUI();
            closeCart();
            renderProducts(); // Render lại kho hàng
        }

        renderProducts(); // Chạy lúc web vừa mở
    </script>
</body>
</html>
